<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | HASSI Signature Noir</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0b0b0b;
            padding: 20px;
        }

        .auth-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }

        .auth-box .logo {
            text-align: center;
            font-size: 28px;
            color: #d4af37;
            font-weight: 700;
        }

        .auth-box .logo span {
            display: block;
            color: #888;
            font-size: 13px;
        }

        .auth-box h2 {
            color: #fff;
            text-align: center;
            margin: 20px 0 8px;
        }

        .auth-box p {
            color: #888;
            text-align: center;
            margin-bottom: 25px;
        }

        .auth-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #0b0b0b;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            outline: none;
        }

        .auth-box input:focus {
            border-color: #d4af37;
        }

        .auth-box button {
            width: 100%;
            padding: 14px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .auth-box button:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        .auth-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-box .link {
            text-align: center;
            margin-top: 15px;
            color: #888;
        }

        .auth-box .link a {
            color: #d4af37;
            text-decoration: none;
        }

        .auth-box .link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #ff4444;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        .success-msg {
            color: #28a745;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .success-msg.show {
            display: block;
        }

        .loading-text {
            display: inline-block;
        }

        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="auth-page">
        <div class="auth-box">
            <div class="logo">HASSI <span>Signature Noir</span></div>
            <h2>Create Account</h2>
            <p>Join the HASSI family</p>

            <div id="registerError" class="error-msg"></div>
            <div id="registerSuccess" class="success-msg"></div>

            <form id="registerForm">
                <input type="text" id="registerName" placeholder="Full Name" required>
                <input type="email" id="registerEmail" placeholder="Email Address" required>
                <input type="password" id="registerPassword" placeholder="Password (min 6 chars)" required>
                <input type="password" id="registerConfirmPassword" placeholder="Confirm Password" required>
                <button type="submit" id="registerBtn">📝 Create Account</button>
            </form>

            <div class="link">Already have an account? <a href="login.html">Login</a></div>
            <div class="link"><a href="index.html">← Back to Home</a></div>
        </div>
    </div>

    <script type="module">
        // ====================================
        // REGISTER - FIREBASE AUTH
        // ====================================

        import { auth, createUserWithEmailAndPassword, db, collection, addDoc } from './firebase.js';

        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const registerError = document.getElementById('registerError');
        const registerSuccess = document.getElementById('registerSuccess');

        registerForm.addEventListener('submit', async function (e) {
            e.preventDefault();

            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const confirmPassword = document.getElementById('registerConfirmPassword').value.trim();

            // Clear previous messages
            registerError.classList.remove('show');
            registerError.textContent = '';
            registerSuccess.classList.remove('show');
            registerSuccess.textContent = '';

            // Validation
            if (!name || !email || !password || !confirmPassword) {
                registerError.textContent = '❌ Please fill all fields';
                registerError.classList.add('show');
                return;
            }

            if (name.length < 2) {
                registerError.textContent = '❌ Name must be at least 2 characters';
                registerError.classList.add('show');
                return;
            }

            if (!email.includes('@')) {
                registerError.textContent = '❌ Please enter a valid email';
                registerError.classList.add('show');
                return;
            }

            if (password.length < 6) {
                registerError.textContent = '❌ Password must be at least 6 characters';
                registerError.classList.add('show');
                return;
            }

            if (password !== confirmPassword) {
                registerError.textContent = '❌ Passwords do not match';
                registerError.classList.add('show');
                return;
            }

            // Show loading
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="spinner"><i class="fa-solid fa-spinner"></i></span> Creating account...';

            try {
                // 1. Create user with Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                console.log('✅ Account created:', user.email);

                // 2. Save user data to Firestore
                await addDoc(collection(db, "users"), {
                    uid: user.uid,
                    name: name,
                    email: email,
                    phone: '',
                    address: '',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });

                console.log('✅ User data saved to Firestore');

                // 3. Save to localStorage
                localStorage.setItem('currentUser', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    name: name
                }));

                // 4. Show success
                registerSuccess.textContent = '✅ Account created successfully! Welcome ' + name + '!';
                registerSuccess.classList.add('show');

                // 5. Reset form
                registerForm.reset();

                // 6. Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                console.error('❌ Signup Error:', error.code, error.message);

                let msg = '❌ ';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        msg += 'This email is already registered. Please login instead.';
                        break;
                    case 'auth/invalid-email':
                        msg += 'Invalid email address format.';
                        break;
                    case 'auth/operation-not-allowed':
                        msg += 'Email/password accounts are not enabled. Contact admin.';
                        break;
                    case 'auth/weak-password':
                        msg += 'Password is too weak. Use at least 6 characters with uppercase, lowercase and numbers.';
                        break;
                    case 'auth/network-request-failed':
                        msg += 'Network error. Please check your internet connection.';
                        break;
                    default:
                        msg += error.message;
                }

                registerError.textContent = msg;
                registerError.classList.add('show');

            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '📝 Create Account';
            }
        });

        console.log('✅ Register Page with Firebase Auth Loaded!');
    </script>

</body>

</html>
